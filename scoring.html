<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Masters · Stone Creek Invitational · Leaders</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --board-white:#f5f2ec;
  --board-bg:#eae6db;
  --board-green:#1e5c2e;
  --board-dark:#0d3318;
  --red:#cc1100;
  --black:#111;
  --gray:#777;
  --border:#ccc5b5;
  --gold:#c9a84c;--goldl:#e8c97a;
  --gdeep:#071a0c;
}
html,body{min-height:100vh;background:var(--board-green);font-family:'Oswald',sans-serif;overflow-x:hidden;}

/* ── BACKGROUND PHOTO ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:url('hole12.png') center center/cover no-repeat;
  z-index:0;
}
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(4,14,7,.80);
  z-index:1;
}
.nav,.flags-strip,.masters-header,.board-container,.legend,.refresh-lbl,.modal-ov{position:relative;z-index:2;}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(7,26,12,.97);border-bottom:2px solid var(--gold);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px);}
.nav-left{display:flex;align-items:center;gap:10px;}
.fpole{width:2px;height:18px;background:var(--gold);}
.ftri{width:0;height:0;border-top:5px solid var(--gold);border-bottom:5px solid transparent;border-left:9px solid var(--gold);margin-bottom:7px;margin-left:-2px;}
.nav-title{font-family:'Playfair Display',serif;font-size:12px;font-style:italic;color:var(--goldl);letter-spacing:.1em;}
.nav-right{display:flex;align-items:center;gap:10px;}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(92,184,92,.12);border:.5px solid rgba(92,184,92,.4);border-radius:20px;padding:3px 10px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.live-txt{font-size:9px;color:#7ed87e;letter-spacing:.12em;text-transform:uppercase;}
.nav-link{font-family:'Playfair Display',serif;font-size:11px;font-style:italic;color:var(--goldl);text-decoration:none;opacity:.55;}
.nav-link:hover{opacity:1;}

/* ── BOARD WRAP ── */
.board-surround{background:var(--board-green);padding:14px 10px 24px;}

/* ── LEADERS HEADER ── */
.leaders-hd{max-width:600px;margin:0 auto;background:var(--board-white);border:3px solid var(--black);border-bottom:none;text-align:center;padding:10px 0 7px;}
.leaders-word{font-family:'Oswald',sans-serif;font-size:36px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--black);}
.leaders-sub{font-family:'EB Garamond',serif;font-size:12px;font-style:italic;color:var(--gray);margin-top:2px;letter-spacing:.06em;}

/* ── MAIN BOARD ── */
.board{max-width:600px;margin:0 auto;background:var(--board-white);border:3px solid var(--black);overflow:hidden;}

/* Column headers */
.board-cols{display:grid;grid-template-columns:44px 1fr 72px 72px 44px;background:var(--board-bg);border-bottom:2px solid var(--black);}
.col-hd{padding:6px 4px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);border-right:1px solid var(--border);}
.col-hd.name-hd{text-align:left;padding-left:12px;}
.col-hd:last-child{border-right:none;}

/* Player rows */
.player-row{display:grid;grid-template-columns:44px 1fr 72px 72px 44px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;align-items:center;}
.player-row:last-child{border-bottom:none;}
.player-row:hover{background:#ede8de;}
.player-row.leader .name-cell{border-left:4px solid var(--red);}
.player-row.leader .score-cell{background:rgba(204,17,0,.04);}

/* Position cell */
.pos-cell{padding:14px 4px;text-align:center;border-right:1px solid var(--border);}
.pos-num{font-size:16px;font-weight:600;color:var(--gray);}
.pos-t{font-size:11px;color:var(--gray);display:block;line-height:1;}

/* Name cell */
.name-cell{padding:12px 10px 12px 14px;border-right:1px solid var(--border);}
.p-name{font-size:18px;font-weight:700;letter-spacing:.04em;color:var(--black);line-height:1.1;}
.p-hometown{font-size:10px;color:var(--gray);font-family:'EB Garamond',serif;font-style:italic;margin-top:2px;}

/* Score cell — the big number */
.score-cell{padding:8px 6px;text-align:center;border-right:1px solid var(--border);}
.vs-num{font-size:32px;font-weight:700;line-height:1;color:var(--black);}
.vs-num.under{color:var(--red);}
.vs-num.even{color:var(--black);}
.vs-num.over{color:var(--black);}

/* Strokes cell */
.strokes-cell{padding:8px 4px;text-align:center;border-right:1px solid var(--border);}
.strokes-num{font-size:18px;font-weight:600;color:var(--black);}
.strokes-lbl{font-size:8px;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}

/* Thru cell */
.thru-cell{padding:8px 4px;text-align:center;}
.thru-num{font-size:16px;font-weight:600;color:var(--black);}
.thru-lbl{font-size:8px;color:var(--gray);text-transform:uppercase;letter-spacing:.08em;margin-top:1px;}
.thru-num.finished{color:var(--red);font-size:13px;}

/* ── BOARD FOOTER ── */
.board-footer{max-width:600px;margin:0 auto;background:var(--board-bg);border:3px solid var(--black);border-top:1px solid var(--border);padding:6px 14px;display:flex;justify-content:space-between;align-items:center;}
.bf-txt{font-size:10px;color:var(--gray);font-family:'EB Garamond',serif;font-style:italic;}
.bf-hint{font-size:10px;color:var(--gray);font-family:'EB Garamond',serif;font-style:italic;}

/* ── EMPTY ── */
.empty-board{max-width:600px;margin:0 auto;background:var(--board-white);border:3px solid var(--black);text-align:center;padding:56px 20px;}
.empty-icon{font-size:44px;margin-bottom:16px;opacity:.25;}
.empty-title{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--black);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--gray);font-family:'EB Garamond',serif;margin-bottom:22px;}
.empty-btn{display:inline-block;background:var(--board-green);padding:10px 24px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fff;text-decoration:none;}

/* ── REFRESH ── */
.refresh-lbl{text-align:center;font-size:10px;color:rgba(255,255,255,.22);padding:8px 0 2px;letter-spacing:.06em;font-family:'EB Garamond',serif;}

/* ── SCORECARD MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:none;align-items:center;justify-content:center;padding:12px;}
.modal-ov.open{display:flex;}
.modal{background:var(--board-white);border:3px solid var(--black);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-hd{background:var(--black);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
.modal-player{font-family:'Oswald',sans-serif;font-size:17px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;}
.modal-vs{font-size:22px;font-weight:700;color:#fff;}
.modal-vs.under{color:#ff6644;}
.modal-x{background:none;border:none;font-size:24px;color:#fff;cursor:pointer;opacity:.5;line-height:1;}
.modal-bd{padding:0;}

/* Scorecard grid */
.sc-section{padding:12px 14px;}
.sc-nine-lbl{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.sc-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;margin-bottom:3px;}
.sc-hd{background:var(--board-bg);border:1px solid var(--border);padding:5px 2px;text-align:center;}
.sc-hd-num{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;color:var(--black);}
.sc-hd-par{font-size:8px;color:var(--gray);margin-top:1px;}
.sc-cell{border:1px solid var(--border);padding:8px 2px;text-align:center;font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;color:var(--black);background:var(--board-white);}
.sc-cell.under{color:var(--red);}
.sc-cell.eagle{color:var(--red);background:#fff8f0;font-size:17px;}
.sc-cell.empty{color:#ccc;font-size:10px;}
.sc-divider{height:1px;background:var(--border);margin:0 14px;}

/* Subtotals */
.sc-subtotal{display:flex;justify-content:space-between;padding:6px 14px;background:var(--board-bg);border-top:1px solid var(--border);}
.sc-sub-lbl{font-size:10px;color:var(--gray);font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.sc-sub-val{font-size:14px;font-weight:700;color:var(--black);}

/* Total row */
.sc-total{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--black);border-top:2px solid var(--black);}
.sc-total-lbl{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);}
.sc-total-val{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;color:#fff;}
.sc-total-val.under{color:#ff6644;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-left">
    <div style="display:flex;align-items:flex-end;"><div class="fpole"></div><div class="ftri"></div></div>
    <span class="nav-title">Stone Creek Invitational · Leaders</span>
  </div>
  <div class="nav-right">
    <div class="live-pill"><div class="live-dot"></div><span class="live-txt">Live</span></div>
    <a href="index.html" class="nav-link">← Weather</a>
    <a href="admin.html" class="nav-link">Admin</a>
  </div>
</nav>

<div class="board-surround">

  <!-- LEADERS HEADER -->
  <div class="leaders-hd">
    <div class="leaders-word">Leaders</div>
    <div class="leaders-sub">Stone Creek Invitational · April 11, 2026</div>
  </div>

  <!-- COLUMN HEADERS -->
  <div id="col-headers" style="display:none;">
    <div class="board" style="border-bottom:none;background:var(--board-bg);">
      <div class="board-cols">
        <div class="col-hd">Pos</div>
        <div class="col-hd name-hd">Player</div>
        <div class="col-hd">Gross</div>
        <div class="col-hd" style="background:rgba(201,168,76,.08);">Net</div>
        <div class="col-hd">Thru</div>
      </div>
    </div>
  </div>

  <!-- MAIN BOARD -->
  <div class="board" id="board"></div>

  <!-- FOOTER -->
  <div class="board-footer" id="board-footer" style="display:none;">
    <span class="bf-txt">Stone Creek · Makanda, IL · Apr 11</span>
    <span class="bf-hint">Tap player for scorecard</span>
  </div>

  <div class="refresh-lbl" id="refresh-lbl">Refreshes every 15 seconds</div>
</div>

<!-- SCORECARD MODAL -->
<div class="modal-ov" id="modal-ov" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-player" id="modal-player">—</span>
      <span class="modal-vs" id="modal-vs">—</span>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-bd" id="modal-bd"></div>
  </div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────
const JSONBIN_ID     = '69cf1477856a682189f51614';
const JSONBIN_KEY    = '$2a$10$44R1Eg/oHWXmy1eTJVFZXur.kKDuM4/k034YqHSjsdsOVvjPIDVjS';
const JSONBIN_ACCESS = '$2a$10$nPS4wCQiSqytcVKjiB.aS.RSXCt975l2MRrGjs2yRVi4R0ZwWUO1C';
const JSONBIN_URL    = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

// ── Apple Creek Golf Club · Blue tees · Par 70 ──────────────────
const PAR = [5,4,3,4,3,5,4,4,4,3,4,3,4,4,4,3,4,5];
const COURSE_PAR = PAR.reduce((a,b)=>a+b,0);

let data = {players:[],lastUpdated:null};

// ── DATA ─────────────────────────────────────────────────────────
async function loadData(){
  try{
    const r = await fetch(JSONBIN_URL+'/latest',{
      headers:{'X-Master-Key':JSONBIN_KEY,'X-Access-Key':JSONBIN_ACCESS}
    });
    if(r.ok){const j=await r.json();data=j.record||data;return;}
  }catch(e){}
  try{const s=localStorage.getItem('scinv2026');if(s)data=JSON.parse(s);}catch(e){}
}

// ── HELPERS ──────────────────────────────────────────────────────
function vsStr(vs){
  if(vs===0)return'E';
  return vs<0?String(vs):'+'+vs;
}
function calcPlayer(p){
  let total=0,played=0,vs=0;
  for(let i=0;i<18;i++){
    const s=p.scores[i];
    if(s&&s>0){total+=s;played++;vs+=s-PAR[i];}
  }
  const hcp=p.hcp||0;
  const net=total>0?total-hcp:0;
  const netVs=total>0?vs-hcp:0;
  return{total,played,vs,net,netVs};
}
function holeCls(s,par){
  if(!s||s<1)return'empty';
  if(s<=par-2)return'eagle';
  if(s<par)return'under';
  if(s===par)return'par';
  return'over';
}

// ── RENDER ───────────────────────────────────────────────────────
function render(){
  const players = data.players||[];
  const board = document.getElementById('board');

  if(!players.length){
    document.getElementById('col-headers').style.display='none';
    document.getElementById('board-footer').style.display='none';
    board.innerHTML=`
      <div class="empty-board">
        <div class="empty-icon">⛳</div>
        <div class="empty-title">Tee Time Coming</div>
        <div class="empty-sub">April 11, 2026 · Stone Creek · 9:00 AM CT</div>
        <a href="admin.html" class="empty-btn">Admin Entry</a>
      </div>`;
    return;
  }

  document.getElementById('col-headers').style.display='block';
  document.getElementById('board-footer').style.display='flex';

  // Sort
  const sorted = players.map(p=>({...p,...calcPlayer(p)}))
    .sort((a,b)=>a.netVs-b.netVs||a.net-b.net||a.vs-b.vs);

  // Positions
  let lastVs=null,lastPos=1;
  sorted.forEach((p,i)=>{
    if(p.netVs===lastVs){p.pos='T'+lastPos;}
    else{lastPos=i+1;p.pos=String(lastPos);lastVs=p.netVs;}
  });

  board.innerHTML = sorted.map((p,i)=>{
    const vStr = vsStr(p.vs);
    const vCls = p.vs<0?'under':p.vs>0?'over':'even';
    const thru = p.played===0?'—':p.played===18?'F':String(p.played);
    const thruCls = p.played===18?'finished':'';
    const isLeader = i===0 && p.played>0;
    const isTied = p.pos.startsWith('T');

    return`<div class="player-row${isLeader?' leader':''}" onclick="openCard('${p.id}')">
      <div class="pos-cell">
        ${isTied?`<span class="pos-t">T</span><span class="pos-num">${p.pos.slice(1)}</span>`:`<span class="pos-num">${p.pos}</span>`}
      </div>
      <div class="name-cell">
        <div class="p-name">${p.name} <span style="font-size:10px;opacity:.45;font-weight:400;font-family:'EB Garamond',serif;font-style:italic;">HCP ${p.hcp||0}</span></div>
        <div class="p-hometown">Thru ${p.played===0?'—':p.played===18?'F':p.played} · Gross ${vStr}</div>
      </div>
      <div class="score-cell">
        <div class="vs-num ${p.netVs<0?'under':p.netVs>0?'over':'even'}">${p.played>0?vsStr(p.netVs):'—'}</div>
        <div class="strokes-lbl">${p.net||'—'} net strokes</div>
      </div>
      <div class="thru-cell">
        <div class="thru-num ${thruCls}">${thru}</div>
        <div class="thru-lbl">Thru</div>
      </div>
    </div>`;
  }).join('');

  const ts = data.lastUpdated?new Date(data.lastUpdated).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'—';
  document.getElementById('refresh-lbl').textContent=`Updated ${ts} · Refreshes every 15s`;
}

// ── SCORECARD MODAL ──────────────────────────────────────────────
function openCard(pid){
  const p = (data.players||[]).find(x=>x.id===pid);
  if(!p)return;
  const{total,played,vs} = calcPlayer(p);
  const hcp = p.hcp||0;
  const netVs = total>0?vs-hcp:0;
  const vStr = vsStr(vs);
  const netStr = played>0?vsStr(netVs):'—';
  const vCls = netVs<0?'under':netVs>0?'over':'';

  document.getElementById('modal-player').textContent = p.name;
  const vsEl = document.getElementById('modal-vs');
  vsEl.textContent = played>0?`Net ${netStr}`:'No scores yet';
  vsEl.className = 'modal-vs '+(netVs<0?'under':'');

  // Front 9
  let frontTotal=0, frontPar=0, backTotal=0, backPar=0;
  for(let h=0;h<9;h++){const s=p.scores[h];if(s>0){frontTotal+=s;frontPar+=PAR[h];}}
  for(let h=9;h<18;h++){const s=p.scores[h];if(s>0){backTotal+=s;backPar+=PAR[h];}}

  let html='';

  // Front 9
  html+=`<div class="sc-section">`;
  html+=`<div class="sc-nine-lbl">Front Nine</div>`;
  html+=`<div class="sc-grid">`;
  for(let h=0;h<9;h++) html+=`<div class="sc-hd"><div class="sc-hd-num">${h+1}</div><div class="sc-hd-par">${PAR[h]}</div></div>`;
  html+=`</div><div class="sc-grid">`;
  for(let h=0;h<9;h++){
    const s=p.scores[h];
    const cls=holeCls(s,PAR[h]);
    html+=`<div class="sc-cell ${cls}">${s&&s>0?s:'·'}</div>`;
  }
  html+=`</div></div>`;
  if(frontTotal>0){
    const fVs=frontTotal-frontPar;
    html+=`<div class="sc-subtotal"><span class="sc-sub-lbl">Front 9</span><span class="sc-sub-val">${frontTotal} (${vsStr(fVs)})</span></div>`;
  }
  html+=`<div class="sc-divider"></div>`;

  // Back 9
  html+=`<div class="sc-section">`;
  html+=`<div class="sc-nine-lbl">Back Nine</div>`;
  html+=`<div class="sc-grid">`;
  for(let h=9;h<18;h++) html+=`<div class="sc-hd"><div class="sc-hd-num">${h+1}</div><div class="sc-hd-par">${PAR[h]}</div></div>`;
  html+=`</div><div class="sc-grid">`;
  for(let h=9;h<18;h++){
    const s=p.scores[h];
    const cls=holeCls(s,PAR[h]);
    html+=`<div class="sc-cell ${cls}">${s&&s>0?s:'·'}</div>`;
  }
  html+=`</div></div>`;
  if(backTotal>0){
    const bVs=backTotal-backPar;
    html+=`<div class="sc-subtotal"><span class="sc-sub-lbl">Back 9</span><span class="sc-sub-val">${backTotal} (${vsStr(bVs)})</span></div>`;
  }

  // Total
  const net=total>0?total-hcp:0;
  const netCls=netVs<0?'under':'';
  const netStrFinal=vsStr(netVs);
  html+=`<div class="sc-total">
    <div>
      <div style="font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;">Gross</div>
      <span class="sc-total-val ${vCls}">${vStr}</span>
      <span style="font-size:13px;color:rgba(255,255,255,.4);margin-left:4px;">${total||'—'}</span>
    </div>
    <div style="text-align:right;">
      <div style="font-size:9px;color:rgba(201,168,76,.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;">Net (HCP ${hcp})</div>
      <span class="sc-total-val ${netCls}">${netStrFinal}</span>
      <span style="font-size:13px;color:rgba(255,255,255,.4);margin-left:4px;">${net||'—'}</span>
    </div>
  </div>`;

  document.getElementById('modal-bd').innerHTML=html;
  document.getElementById('modal-ov').classList.add('open');
}
function closeModal(){document.getElementById('modal-ov').classList.remove('open');}

// ── INIT ─────────────────────────────────────────────────────────
async function refresh(){await loadData();render();}
refresh();
setInterval(refresh,15000);
</script>
</body>
</html>
